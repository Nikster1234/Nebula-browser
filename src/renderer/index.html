<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'"
    />
    <title>Nebula</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="workspace-sidebar" aria-label="Sidebar">
        <div class="sidebar-rail">
          <div class="rail-group">
            <button class="rail-button brand-button" id="homeButton" type="button" aria-label="Start page" title="Start page">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="4" y="4" width="6" height="6" rx="1.5"></rect>
                <rect x="14" y="4" width="6" height="6" rx="1.5"></rect>
                <rect x="4" y="14" width="6" height="6" rx="1.5"></rect>
                <rect x="14" y="14" width="6" height="6" rx="1.5"></rect>
              </svg>
            </button>
            <button class="rail-button" id="favoritesToggleButton" type="button" aria-label="Favorites" title="Favorites">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 20.5s-6.5-4.4-8.5-8c-1.3-2.3-.5-5.3 1.8-6.7 2.2-1.3 5-0.8 6.7 1.1 1.7-1.9 4.5-2.4 6.7-1.1 2.3 1.4 3.1 4.4 1.8 6.7-2 3.6-8.5 8-8.5 8Z"></path>
              </svg>
            </button>
            <button class="rail-button" id="workspaceToggleButton" type="button" aria-label="Workspaces" title="Workspaces">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="4" y="5" width="12" height="8" rx="2"></rect>
                <path d="M8 17h12v-8"></path>
                <path d="M8 17V9"></path>
              </svg>
            </button>
            <button class="rail-button" id="performanceToggleButton" type="button" aria-label="Performance mode" title="Performance mode">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 4h8"></path>
                <path d="M9 4v4l3 4-3 4v4"></path>
                <path d="M15 4v4l-3 4 3 4v4"></path>
              </svg>
            </button>
            <button class="rail-button" id="downloadsToggleButton" type="button" aria-label="Downloads" title="Downloads">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 4v10"></path>
                <path d="m8 10 4 4 4-4"></path>
                <path d="M5 20h14"></path>
              </svg>
            </button>
            <button class="rail-button" id="historyToggleButton" type="button" aria-label="History" title="History">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 12a8 8 0 1 0 2.3-5.7"></path>
                <path d="M4 4v4h4"></path>
                <path d="M12 8v4l3 2"></path>
              </svg>
            </button>
            <button class="rail-button" id="riskyModeButton" type="button" aria-label="Risky site mode" title="Risky site mode (Ctrl+Alt+R)">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3 4 7v5c0 5 3.4 8.9 8 10 4.6-1.1 8-5 8-10V7l-8-4Z"></path>
                <path d="M12 8v5"></path>
                <circle cx="12" cy="16.5" r="1"></circle>
              </svg>
            </button>
            <button class="rail-button" id="focusAddressButton" type="button" aria-label="Focus address bar" title="Focus address bar">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="6"></circle>
                <path d="m20 20-4.2-4.2"></path>
              </svg>
            </button>
          </div>

          <div class="rail-group rail-group-bottom">
            <button class="rail-button" id="newProfileButton" type="button" aria-label="Create workspace" title="Create workspace">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="4" y="6" width="12" height="10" rx="2"></rect>
                <path d="M18 9v6"></path>
                <path d="M15 12h6"></path>
              </svg>
            </button>
            <button class="rail-button" id="settingsToggle" type="button" aria-label="Settings" title="Settings">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="3.5"></circle>
                <path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.3 1a7.4 7.4 0 0 0-1.7-1l-.3-2.4h-4l-.3 2.4a7.4 7.4 0 0 0-1.7 1l-2.3-1-2 3.5 2 1.5A7 7 0 0 0 5 12c0 .3 0 .7.1 1l-2 1.5 2 3.5 2.3-1a7.4 7.4 0 0 0 1.7 1l.3 2.4h4l.3-2.4a7.4 7.4 0 0 0 1.7-1l2.3 1 2-3.5-2-1.5c.1-.3.1-.7.1-1Z"></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="sidebar-drawer hidden" id="sidebarDrawer">
          <section class="drawer-panel hidden" id="favoritesPanel" aria-label="Favorites panel">
            <div class="drawer-header">
              <div>
                <p class="drawer-eyebrow">Saved Pages</p>
                <h2>Favorites</h2>
              </div>
              <button class="drawer-action" id="favoriteCurrentButton" type="button">Save This Page</button>
            </div>
            <div class="drawer-list" id="favoritesList"></div>
          </section>

          <section class="drawer-panel hidden" id="workspacePanel" aria-label="Workspace panel">
            <div class="drawer-header">
              <div>
                <p class="drawer-eyebrow">Profiles</p>
                <h2>Workspaces</h2>
              </div>
              <button class="drawer-action" id="newWorkspaceDrawerButton" type="button">Create</button>
            </div>
            <form class="workspace-create hidden" id="workspaceCreateForm">
              <label class="workspace-create-field" for="profileNameInput">
                <span class="drawer-eyebrow">Create workspace</span>
                <input id="profileNameInput" type="text" maxlength="20" placeholder="Name this workspace" autocomplete="off" />
              </label>
              <div class="workspace-create-actions">
                <button class="secondary-action" id="workspaceCreateCancelButton" type="button">Cancel</button>
                <button class="primary-action" type="submit">Create</button>
              </div>
            </form>
            <div class="drawer-list workspace-drawer-list" id="profileRail"></div>
          </section>

          <section class="drawer-panel hidden" id="downloadsPanel" aria-label="Downloads panel">
            <div class="drawer-header">
              <div>
                <p class="drawer-eyebrow">Recent Transfers</p>
                <h2>Downloads</h2>
              </div>
              <button class="drawer-action" id="openDownloadsFolderButton" type="button">Open Downloads Folder</button>
            </div>
            <div class="drawer-list" id="downloadsList"></div>
          </section>

          <section class="drawer-panel hidden" id="historyPanel" aria-label="History panel">
            <div class="drawer-header">
              <div>
                <p class="drawer-eyebrow">Recent Pages</p>
                <h2>History</h2>
              </div>
            </div>
            <div class="drawer-list" id="historyList"></div>
          </section>

          <section class="drawer-panel hidden" id="settingsPanel" aria-label="Settings panel">
            <div class="drawer-header">
              <div>
                <p class="drawer-eyebrow">Browser Settings</p>
                <h2>Settings</h2>
              </div>
            </div>

            <div class="settings-section">
              <p class="section-label">Accent Color</p>
              <div class="swatch-row" id="accentRow"></div>
            </div>

            <div class="settings-section">
              <p class="section-label">Performance Mode</p>
              <div class="segmented-row">
                <button class="segment-button" data-performance="lean" type="button">Lean</button>
                <button class="segment-button" data-performance="balanced" type="button">Balanced</button>
              </div>
              <p class="microcopy">Lean suspends background tabs. Balanced keeps more tabs ready to switch back to.</p>
            </div>

            <div class="settings-section">
              <label class="toggle-row">
                <span>
                  <strong>Ad blocking</strong>
                  <small>Uses the installed Ghostery engine to block ads and trackers.</small>
                </span>
                <input id="adblockToggle" type="checkbox" />
              </label>

              <label class="toggle-row">
                <span>
                  <strong>Compact header</strong>
                  <small>Use a shorter top bar to leave more room for page content.</small>
                </span>
                <input id="compactToggle" type="checkbox" />
              </label>
            </div>
          </section>
        </div>
      </aside>

      <main class="content-shell">
        <header class="chrome" id="chromeRoot">
          <div class="tab-row">
            <div class="tab-strip" id="tabStrip"></div>
            <button class="secondary-action toolbar-plus" id="newTabButton" type="button" aria-label="New tab">+</button>
            <span class="metric-pill" id="tabCountPill">0 tabs</span>
          </div>

          <div class="command-bar">
            <div class="nav-buttons">
              <button class="nav-button" id="backButton" type="button" aria-label="Back">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m14 6-6 6 6 6"></path>
                </svg>
              </button>
              <button class="nav-button" id="forwardButton" type="button" aria-label="Forward">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m10 6 6 6-6 6"></path>
                </svg>
              </button>
              <button class="nav-button" id="reloadButton" type="button" aria-label="Reload">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M20 11a8 8 0 1 0 2 5.3"></path>
                  <path d="M20 4v7h-7"></path>
                </svg>
              </button>
            </div>

            <form class="address-shell" id="addressForm">
              <label class="sr-only" for="addressInput">Address</label>
              <span class="toolbar-search-icon" aria-hidden="true"></span>
              <input id="addressInput" type="text" autocomplete="off" spellcheck="false" placeholder="Search Google or type a URL" />
            </form>
          </div>
        </header>
      </main>


    </div>

    <script src="./app.js"></script>
  </body>
</html>
